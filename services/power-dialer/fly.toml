# Fly.io app definition for the power-dialer worker.
# Used only when scaling beyond the mac mini test group. Until then the
# worker runs locally via launchd/com.koino.powerdialer.plist.
app = "koino-power-dialer"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  POWER_DIALER_PORT = "9787"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 9787
  force_https = true
  auto_stop_machines = false   # webhooks expect us to be live
  auto_start_machines = true
  min_machines_running = 1
  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 400

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
