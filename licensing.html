<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<!-- Anti-FOUC: set data-theme before first paint -->
<script>!function(){try{var t=localStorage.getItem('repflow_theme')||'dark';if(t==='system')t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';document.documentElement.dataset.theme=t;}catch(e){document.documentElement.dataset.theme='dark';}}();</script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Insurance Licensing OS — Repflow by Koino Capital</title>
<meta name="description" content="State-by-state roadmap to a producer license — Life, Health, Annuity, Mortgage Protection. Study guides, adaptive practice exams, and AI tutoring. All 50 states."/>
<meta property="og:title" content="Insurance Licensing OS — Repflow"/>
<meta property="og:description" content="Study guides · Practice exams · All 50 states. The fastest way for new insurance agents to pass their state licensing exam."/>
<meta property="og:url" content="https://repflow.koino.capital/licensing"/>
<meta property="og:image" content="https://repflow.koino.capital/og-licensing.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="Insurance Licensing OS — Repflow"/>
<meta name="twitter:description" content="Study guides · Practice exams · AI tutor · All 50 states."/>
<meta name="twitter:image" content="https://repflow.koino.capital/og-licensing.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css?v=93"/>
<link rel="icon" type="image/svg+xml" href="/icon-licensing.svg"/>
<link rel="alternate icon" href="/icon-licensing.svg"/>
<style>
  /* Standalone wrapper — no sidebar, no topbar, no auth. */
  body { background: var(--bg-base); margin: 0; }
  .lic-shell {
    min-height: 100vh;
    display: flex; flex-direction: column;
    max-width: 1280px; margin: 0 auto;
  }
  .lic-banner {
    padding: 10px 22px;
    background: color-mix(in oklch, var(--accent-money) 10%, var(--bg-elevated));
    border-bottom: 1px solid color-mix(in oklch, var(--accent-money) 25%, transparent);
    display: flex; align-items: center; gap: 12px; font-size: 12px;
  }
  .lic-banner strong { color: var(--accent-money); letter-spacing: 0.04em; text-transform: uppercase; font-size: 11px; }
  .lic-banner a { color: var(--text-primary); text-decoration: underline; opacity: 0.85; }
  .lic-banner a:hover { opacity: 1; }
  /* Footer */
  .lic-footer {
    margin-top: auto;
    padding: 20px 22px;
    border-top: 1px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--text-quaternary);
  }
  .lic-footer a { color: var(--accent-money); text-decoration: none; opacity: 0.85; }
  .lic-footer a:hover { opacity: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PDF / Print styles ───────────────────────────────────────── */
  @media print {
    .lic-banner, .lic-footer, .btn, button, .chip { display: none !important; }
    .lic-shell { max-width: 100%; margin: 0; }
    body { background: #fff !important; color: #111 !important; font-size: 11pt; }
    .panel { border: 1px solid #ccc !important; page-break-inside: avoid; margin-bottom: 16pt; }
    .panel-h { background: #f5f5f5 !important; color: #111 !important; }
    .pdf-print-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 8pt 16pt;
      border-top: 1pt solid #ccc;
      display: flex !important;
      justify-content: space-between;
      font-size: 8pt; color: #666;
      background: #fff;
    }
  }
  /* Hidden normally, shown only during print via JS window open */
  .pdf-print-footer { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<!-- Minimum dependencies for PageLicensing to render. The page only fetches
     /lib/licensing-data.json and POSTs to /api/licensing-tutor — no Supabase,
     no AppData, no auth required. Order: icons → shared → page-licensing. -->
<script src="dist/icons.js?v=93"></script>
<script src="dist/shared.js?v=112"></script>
<!-- Study guide static data — no bundler needed; exposes window.LicensingStudyGuides -->
<script src="lib/licensing-study-guides.js?v=7"></script>
<script src="dist/page-licensing.js?v=14"></script>

<script>
/* Standalone licensing shell.
   Mounts window.PageLicensing directly. No sidebar, no auth, no role
   switcher. Includes light/dark theme toggle using the same
   localStorage key as the main Repflow app. */
(function () {
  var THEME_KEY = "repflow_theme";

  function getTheme() {
    try { return localStorage.getItem(THEME_KEY) || "dark"; } catch { return "dark"; }
  }
  function setTheme(t) {
    try { localStorage.setItem(THEME_KEY, t); } catch {}
    document.documentElement.dataset.theme = t;
  }

  function ThemeToggle() {
    var [theme, setT] = React.useState(getTheme);
    var toggle = function () {
      var next = theme === "dark" ? "light" : "dark";
      setTheme(next);
      setT(next);
    };
    var isDark = theme === "dark";
    return React.createElement("button", {
      onClick: toggle,
      title: isDark ? "Switch to light mode" : "Switch to dark mode",
      style: {
        background: "transparent",
        border: "1px solid var(--border-subtle)",
        borderRadius: "var(--radius-sm)",
        cursor: "pointer",
        padding: "4px 10px",
        fontSize: 11,
        color: "var(--text-secondary)",
        display: "flex",
        alignItems: "center",
        gap: 5,
        transition: "background 0.15s",
        lineHeight: 1,
      }
    },
      React.createElement("span", { style: { fontSize: 13 } }, isDark ? "☀️" : "🌙"),
      isDark ? "Light" : "Dark"
    );
  }

  function Footer() {
    var year = new Date().getFullYear();
    return React.createElement("div", { className: "lic-footer" },
      React.createElement("div", null,
        "© " + year + " ",
        React.createElement("a", { href: "https://koino.capital", target: "_blank", rel: "noopener noreferrer" }, "Koino Capital"),
        " · RepFlow Insurance Agency Software"
      ),
      React.createElement("div", { style: { display: "flex", gap: 16, alignItems: "center" } },
        React.createElement("span", null, "Study guides sourced from official state DOI handbooks · Verify all numbers before exam day"),
        React.createElement("a", { href: "https://koino.capital", target: "_blank", rel: "noopener noreferrer" },
          "koino.capital"
        )
      )
    );
  }

  function LicensingApp() {
    var Page = window.PageLicensing;
    if (!Page) {
      return React.createElement("div", {
        style: { padding: 40, color: "var(--text-tertiary)", fontSize: 13 }
      }, "Loading…");
    }
    return React.createElement("div", { className: "lic-shell" },
      React.createElement("div", { className: "lic-banner" },
        React.createElement("strong", null, "Repflow Licensing"),
        React.createElement("span", { style: { color: "var(--text-secondary)" } },
          "Public · no sign-in required · powered by Repflow"
        ),
        React.createElement("div", { style: { marginLeft: "auto", display: "flex", gap: 10, alignItems: "center" } },
          React.createElement(ThemeToggle),
          React.createElement("a", { href: "/" },
            "Open full app →"
          )
        )
      ),
      React.createElement(Page, { role: "manager" }),
      React.createElement(Footer)
    );
  }
  var root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(LicensingApp));
})();
</script>
</body>
</html>
