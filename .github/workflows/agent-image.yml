name: Build & publish Repflow agent image

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/agent-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          echo "sha=ghcr.io/${{ github.repository_owner }}/repflow-agent:$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "latest=ghcr.io/${{ github.repository_owner }}/repflow-agent:latest" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agent/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
