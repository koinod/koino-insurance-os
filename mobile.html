<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Repflow Mobile — rep app</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="mobile-styles.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #0c0d11; height: 100%; overflow: hidden; }
  #root { width: 100vw; height: 100vh; display: grid; place-items: center; }
  .mobile-stage-host { width: 100%; height: 100%; display: grid; place-items: center; padding: 16px; box-sizing: border-box; position: relative; }
  .mobile-back {
    position: fixed; top: 14px; left: 14px; z-index: 100;
    height: 32px; padding: 0 12px;
    background: rgba(20,22,28,0.7);
    -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    color: #ddd; font-size: 12px; font-family: var(--font-ui);
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none;
  }
  .mobile-frame-fit {
    transform-origin: center center;
    will-change: transform;
  }
  /* On real phones, drop the frame chrome and fill the viewport */
  @media (max-width: 700px) {
    .mobile-stage-host { padding: 0; }
    .mobile-frame-fit { width: 100vw !important; height: 100vh !important; transform: none !important; }
    .mobile-frame-fit > div { border-radius: 0 !important; box-shadow: none !important; }
  }
</style>
</head>
<body>
<a class="mobile-back" href="/">← Desktop</a>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>

<link rel="manifest" href="/manifest.webmanifest"/>
<link rel="icon" type="image/svg+xml" href="/icon.svg"/>
<link rel="apple-touch-icon" href="/icon.svg"/>
<script>if ("serviceWorker" in navigator) { window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {})); }</script>
<script type="text/babel" src="ios-frame.jsx?v=4"></script>
<script type="text/babel" src="data.jsx?v=4"></script>
<script type="text/babel" src="mobile-screens.jsx?v=4"></script>
<script type="text/babel" src="mobile-extra-screens.jsx?v=4"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const PHONE_W = 402;
const PHONE_H = 874;

function Phone({ children }) {
  return (
    <IOSDevice width={PHONE_W} height={PHONE_H} dark={true} hasBottomBar={false} statusBar={<IOSStatusBar dark={true} time="9:41"/>}>
      <div style={{ width: "100%", height: "100%", background: "var(--bg-base)" }}>{children}</div>
    </IOSDevice>
  );
}

function FitFrame({ children }) {
  // Scale the iPhone artboard so it fills the available viewport height,
  // letting it shrink on narrow desktops while remaining a single, navigable screen.
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const recompute = () => {
      const isPhone = window.matchMedia("(max-width: 700px)").matches;
      if (isPhone) { setScale(1); return; }
      const padX = 32, padY = 32;
      const sx = (window.innerWidth  - padX) / (PHONE_W + 60);  // +60 for device chrome
      const sy = (window.innerHeight - padY) / (PHONE_H + 60);
      setScale(Math.min(1.1, Math.min(sx, sy)));
    };
    recompute();
    window.addEventListener("resize", recompute);
    return () => window.removeEventListener("resize", recompute);
  }, []);
  return (
    <div className="mobile-stage-host">
      <div className="mobile-frame-fit" style={{ transform: `scale(${scale})` }}>
        {children}
      </div>
    </div>
  );
}

function FlowPhone() {
  const [view, setView] = useState({ name: "home", lead: null });
  const nav = (n) => setView({ name: n, lead: null });
  let screen;
  if      (view.name === "home")     screen = <MScreenToday       onNav={nav}/>;
  else if (view.name === "queue")    screen = <MScreenQueue       onNav={nav} onCall={(l) => setView({ name: "call", lead: l })} onLead={(l) => setView({ name: "lead", lead: l })}/>;
  else if (view.name === "call")     screen = <MScreenCall        lead={view.lead} onEnd={() => setView({ name: "queue", lead: null })}/>;
  else if (view.name === "lead")     screen = <MScreenLead        lead={view.lead} onBack={() => setView({ name: "queue", lead: null })} onCall={() => setView({ name: "call", lead: view.lead })}/>;
  else if (view.name === "lb")       screen = <MScreenLeaderboard onNav={nav}/>;
  else if (view.name === "comm")     screen = <MScreenComm        onNav={nav}/>;
  else if (view.name === "pipeline" && window.MScreenPipeline) { const C = window.MScreenPipeline; screen = <C onNav={nav} onLead={(l) => setView({ name: "lead", lead: l })}/>; }
  else if (view.name === "coaching" && window.MScreenCoaching) { const C = window.MScreenCoaching; screen = <C onNav={nav}/>; }
  else if (view.name === "vault"     && window.MScreenVault)    { const C = window.MScreenVault;    screen = <C onNav={nav}/>; }
  else if (view.name === "settings"  && window.MScreenSettings) { const C = window.MScreenSettings; screen = <C onNav={nav}/>; }
  else screen = <MScreenToday onNav={nav}/>;

  return <Phone>
    {screen}
    <div className="m-quicknav">
      {[
        { k: "home",     l: "Today" },
        { k: "pipeline", l: "Pipe" },
        { k: "queue",    l: "Queue" },
        { k: "coaching", l: "Coach" },
        { k: "vault",    l: "Vault" },
        { k: "settings", l: "Set" },
      ].map(t => (
        <button key={t.k} className={`m-quicknav-btn ${view.name === t.k ? "active" : ""}`} onClick={() => nav(t.k)}>{t.l}</button>
      ))}
    </div>
  </Phone>;
}

function App() {
  return <FitFrame><FlowPhone/></FitFrame>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
