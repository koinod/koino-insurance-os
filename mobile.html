<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1"/>
<title>Repflow Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="mobile-styles.css"/>
<style>
  /* Lock the page so swiping inside the app never scrolls / pans / overscrolls. */
  html, body {
    margin: 0; padding: 0;
    background: #0c0d11;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;  /* allow vertical scroll only inside .m-scroll */
  }
  body { position: fixed; inset: 0; }
  #root { width: 100vw; height: 100vh; height: 100dvh; }

  /* Desktop: show the iPhone artboard frame, scaled to fit. */
  .mobile-stage-host {
    width: 100%; height: 100%;
    display: grid; place-items: center;
    padding: 16px; box-sizing: border-box; position: relative;
  }
  .mobile-back {
    position: fixed; top: 14px; left: 14px; z-index: 100;
    height: 32px; padding: 0 12px;
    background: rgba(20,22,28,0.7);
    -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    color: #ddd; font-size: 12px; font-family: var(--font-ui);
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none;
  }
  .mobile-frame-fit { transform-origin: center center; will-change: transform; }

  /* On real phones: ditch the artboard, fill the screen edge-to-edge.
     Hide the fake status bar, hide the back-link, respect safe-area insets. */
  @media (max-width: 700px) {
    .mobile-stage-host { padding: 0; }
    .mobile-frame-fit { width: 100vw !important; height: 100dvh !important; transform: none !important; }
    .mobile-frame-fit > div { border-radius: 0 !important; box-shadow: none !important; }
    /* IOSDevice wrapper: kill the bezel + notch on phones */
    .mobile-frame-fit svg, .mobile-frame-fit > div::before, .mobile-frame-fit > div::after { display: none !important; }
    .m-statusbar { display: none !important; }
    .mobile-back { display: none; }
    .mobile-frame { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    .m-content { padding-top: max(8px, env(safe-area-inset-top)) !important; }
    .m-tabbar  { padding-bottom: env(safe-area-inset-bottom); height: calc(60px + env(safe-area-inset-bottom)) !important; }
  }
  /* The screens themselves should fit, scrolling only inside .m-scroll */
  .m-screen { height: 100%; display: flex; flex-direction: column; }
  .m-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .m-screen, .swipe-card, .cardstack { touch-action: none; }
  .m-scroll, .m-scroll * { touch-action: pan-y; }
</style>
</head>
<body>
<a class="mobile-back" href="/">← Desktop</a>
<div id="root"></div>

<link rel="manifest" href="/manifest.webmanifest"/>
<link rel="icon" type="image/svg+xml" href="/icon.svg"/>
<link rel="apple-touch-icon" href="/icon.svg"/>
<script>if ("serviceWorker" in navigator) { window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {})); }</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>

<script src="lib/supabase-config.js?v=15"></script>
<script type="text/babel" src="ios-frame.jsx?v=14"></script>
<script type="text/babel" src="data.jsx?v=14"></script>
<script type="text/babel" src="mobile-screens.jsx?v=17"></script>
<script type="text/babel" src="mobile-extra-screens.jsx?v=17"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const PHONE_W = 402;
const PHONE_H = 874;

function Phone({ children }) {
  return (
    <IOSDevice width={PHONE_W} height={PHONE_H} dark={true} hasBottomBar={false} statusBar={null}>
      <div style={{ width: "100%", height: "100%", background: "var(--bg-base)", display: "flex", flexDirection: "column" }}>{children}</div>
    </IOSDevice>
  );
}

function FullScreen({ children }) {
  // On a real phone, just fill the viewport — no bezel, no fake status bar.
  return (
    <div style={{ width: "100vw", height: "100dvh", background: "var(--bg-base)", display: "flex", flexDirection: "column", overflow: "hidden", touchAction: "none" }}>
      {children}
    </div>
  );
}

function ResponsiveFrame({ children }) {
  const [mode, setMode] = useState(() => window.matchMedia("(max-width: 700px)").matches ? "phone" : "desktop");
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const recompute = () => {
      const phone = window.matchMedia("(max-width: 700px)").matches;
      setMode(phone ? "phone" : "desktop");
      if (!phone) {
        const padX = 32, padY = 32;
        const sx = (window.innerWidth  - padX) / (PHONE_W + 60);
        const sy = (window.innerHeight - padY) / (PHONE_H + 60);
        setScale(Math.min(1.1, Math.min(sx, sy)));
      }
    };
    recompute();
    window.addEventListener("resize", recompute);
    window.addEventListener("orientationchange", recompute);
    return () => {
      window.removeEventListener("resize", recompute);
      window.removeEventListener("orientationchange", recompute);
    };
  }, []);
  if (mode === "phone") return <FullScreen>{children}</FullScreen>;
  return (
    <div className="mobile-stage-host">
      <div className="mobile-frame-fit" style={{ transform: `scale(${scale})` }}>
        <Phone>{children}</Phone>
      </div>
    </div>
  );
}

function FlowPhone() {
  const [view, setView] = useState({ name: "home", lead: null });
  const nav = (n) => setView({ name: n, lead: null });
  let screen;
  if      (view.name === "home")     screen = <MScreenToday       onNav={nav}/>;
  else if (view.name === "queue")    screen = <MScreenQueue       onNav={nav} onCall={(l) => setView({ name: "call", lead: l })} onLead={(l) => setView({ name: "lead", lead: l })}/>;
  else if (view.name === "call")     screen = <MScreenCall        lead={view.lead} onEnd={() => setView({ name: "queue", lead: null })}/>;
  else if (view.name === "lead")     screen = <MScreenLead        lead={view.lead} onBack={() => setView({ name: "queue", lead: null })} onCall={() => { window.repflowDial && window.repflowDial("+1512555" + (view.lead?.id || "0").toString().padStart(4, "0").slice(0, 4), view.lead?.lead); setView({ name: "call", lead: view.lead }); }}/>;
  else if (view.name === "lb")       screen = <MScreenLeaderboard onNav={nav}/>;
  else if (view.name === "comm")     screen = <MScreenComm        onNav={nav}/>;
  else if (view.name === "pipeline" && window.MScreenPipeline) { const C = window.MScreenPipeline; screen = <C onNav={nav} onLead={(l) => setView({ name: "lead", lead: l })}/>; }
  else if (view.name === "coaching" && window.MScreenCoaching) { const C = window.MScreenCoaching; screen = <C onNav={nav}/>; }
  else if (view.name === "vault"     && window.MScreenVault)    { const C = window.MScreenVault;    screen = <C onNav={nav}/>; }
  else if (view.name === "settings"  && window.MScreenSettings) { const C = window.MScreenSettings; screen = <C onNav={nav}/>; }
  else screen = <MScreenToday onNav={nav}/>;

  return <>
    {screen}
    <div className="m-quicknav" style={{ flexShrink: 0 }}>
      {[
        { k: "home",     l: "Today" },
        { k: "pipeline", l: "Pipe" },
        { k: "queue",    l: "Queue" },
        { k: "coaching", l: "Coach" },
        { k: "vault",    l: "Vault" },
        { k: "settings", l: "Set" },
      ].map(t => (
        <button key={t.k} className={`m-quicknav-btn ${view.name === t.k ? "active" : ""}`} onClick={() => nav(t.k)}>{t.l}</button>
      ))}
    </div>
  </>;
}

function App() {
  return <ResponsiveFrame><FlowPhone/></ResponsiveFrame>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
